name: Supplychain Scan
description: Fail-closed dependency and repository supply-chain scan without executing project code
author: noeljackson

inputs:
  path:
    description: Repository path to scan
    required: false
    default: .
  policy:
    description: auto or strict
    required: false
    default: strict
  minimum-release-age-days:
    description: Minimum npm package publication age for Bun lockfiles
    required: false
    default: "7"
  baseline:
    description: Reviewed Bun baseline path relative to the repository
    required: false
    default: .supplychain/bun-baseline.json
  scan-source:
    description: Run repository, dependency, OSV, Bun, and zizmor checks
    required: false
    default: "true"
  image:
    description: Optional local or registry OCI image to inventory and scan
    required: false
    default: ""
  fail-on-severity:
    description: Minimum Grype severity that fails an image scan
    required: false
    default: high
  only-fixed:
    description: Only fail image vulnerabilities for which a fix exists
    required: false
    default: "false"

outputs:
  sbom:
    description: Path to the generated SPDX JSON SBOM when image is set
    value: ${{ steps.image.outputs.sbom }}

runs:
  using: composite
  steps:
    - name: Set up pinned Go toolchain
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: false
    - name: Build pinned scanner source
      shell: bash
      env:
        GOTOOLCHAIN: local
        GOPROXY: https://proxy.golang.org
        GOSUMDB: sum.golang.org
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"
        go mod verify
        go build -trimpath -ldflags '-s -w' -o "$RUNNER_TEMP/supplychain-action" ./
    - name: Install pinned advisory tools
      shell: bash
      env:
        SUPPLYCHAIN_BIN_DIR: ${{ runner.temp }}/supplychain-bin
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_SCAN_SOURCE: ${{ inputs.scan-source }}
      run: |
        set -euo pipefail
        args=()
        case "$INPUT_SCAN_SOURCE" in
          true) args+=(--source-tools) ;;
          false) ;;
          *) echo "scan-source must be true or false" >&2; exit 2 ;;
        esac
        if [ -n "$INPUT_IMAGE" ]; then
          args+=(--image-tools)
        fi
        if [ "${#args[@]}" -eq 0 ]; then
          echo "at least one of scan-source or image must be enabled" >&2
          exit 2
        fi
        "${{ github.action_path }}/scripts/install-ci-tools" "${args[@]}"
    - name: Scan repository without executing it
      if: inputs.scan-source == 'true'
      shell: bash
      env:
        SUPPLYCHAIN_DATA_DIR: ${{ runner.temp }}/supplychain-data
        INPUT_PATH: ${{ inputs.path }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_MINIMUM_AGE: ${{ inputs.minimum-release-age-days }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        SUPPLYCHAIN_BIN_DIR: ${{ runner.temp }}/supplychain-bin
      run: |
        set -euo pipefail
        "$RUNNER_TEMP/supplychain-action" ci \
          --policy="$INPUT_POLICY" \
          --minimum-age-days="$INPUT_MINIMUM_AGE" \
          --baseline="$INPUT_BASELINE" \
          "$INPUT_PATH"
    - name: Inventory and scan OCI image
      id: image
      if: inputs.image != ''
      shell: bash
      env:
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_FAIL_ON: ${{ inputs.fail-on-severity }}
        INPUT_ONLY_FIXED: ${{ inputs.only-fixed }}
        SUPPLYCHAIN_BIN_DIR: ${{ runner.temp }}/supplychain-bin
      run: |
        set -euo pipefail
        case "$INPUT_ONLY_FIXED" in
          true) only_fixed=(--only-fixed) ;;
          false) only_fixed=() ;;
          *) echo "only-fixed must be true or false" >&2; exit 2 ;;
        esac
        sbom="$RUNNER_TEMP/supplychain.spdx.json"
        "$RUNNER_TEMP/supplychain-action" image \
          --sbom="$sbom" \
          --fail-on="$INPUT_FAIL_ON" \
          "${only_fixed[@]}" \
          "$INPUT_IMAGE"
        echo "sbom=$sbom" >> "$GITHUB_OUTPUT"

branding:
  icon: shield
  color: purple
