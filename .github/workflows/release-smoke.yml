name: release-smoke

# Manually re-runs the release smoke suite against a selected or latest tag.
# The normal release workflow performs its own automatic post-release smoke.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to smoke-test (e.g. v0.1.3). Defaults to the latest release.'
        required: false

permissions:
  contents: read

jobs:
  brew-mac:
    runs-on: macos-latest
    steps:
      - name: Resolve target tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            TAG=$(gh release view --repo "$REPOSITORY" --json tagName --jq .tagName)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Brew install via tap
        run: |
          brew tap noeljackson/tap
          brew install supplychain

      - name: supplychain version (must match the released tag)
        env:
          EXPECTED_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          OUT=$(supplychain version)
          echo "$OUT"
          echo "$OUT" | grep -F "$EXPECTED_TAG" || {
            echo "::error::version output '$OUT' does not contain expected tag '$EXPECTED_TAG'"
            exit 1
          }

      - name: supplychain doctor (sanity check)
        run: supplychain doctor

      - name: scan a clean fixture (no findings expected)
        run: |
          mkdir clean-fixture
          cat > clean-fixture/package.json <<'JSON'
          { "name": "smoke", "version": "1.0.0",
            "dependencies": { "lodash": "^4.17.21" } }
          JSON
          supplychain --no-update scan clean-fixture

      - name: scan a malicious fixture (must exit 1)
        run: |
          mkdir dirty-fixture
          cat > dirty-fixture/package.json <<'JSON'
          { "name": "smoke-dirty", "version": "1.0.0",
            "dependencies": { "@tanstack/router-utils": "^1.161.0" } }
          JSON
          if supplychain --no-update scan dirty-fixture; then
            echo "::error::expected exit 1 on known-bad fixture, got 0"
            exit 1
          fi
          echo "ok — malicious fixture correctly flagged"
