name: reusable-supplychain-scan

on:
  workflow_call:
    inputs:
      policy:
        description: auto or strict
        required: false
        type: string
        default: strict
      minimum-release-age-days:
        description: Minimum npm package publication age for Bun lockfiles
        required: false
        type: number
        default: 7
      baseline:
        description: Reviewed Bun baseline path
        required: false
        type: string
        default: .supplychain/bun-baseline.json

permissions:
  contents: read

jobs:
  scan:
    name: scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository under inspection
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Check out the exact called-workflow source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .supplychain-action
          persist-credentials: false
      - name: Run supplychain
        uses: ./.supplychain-action
        with:
          path: .
          policy: ${{ inputs.policy }}
          minimum-release-age-days: ${{ inputs.minimum-release-age-days }}
          baseline: ${{ inputs.baseline }}
