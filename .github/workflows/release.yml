name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: linux,  arch: amd64, runner: ubuntu-latest }
          - { os: linux,  arch: arm64, runner: ubuntu-latest }
          - { os: darwin, arch: amd64, runner: macos-latest  }
          - { os: darwin, arch: arm64, runner: macos-latest  }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: build
        env:
          GOOS:   ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -ldflags "-s -w" -o "dist/supplychain-${GOOS}-${GOARCH}" ./
      - uses: actions/upload-artifact@v4
        with:
          name: supplychain-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
