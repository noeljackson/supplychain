# Replace FULL_COMMIT_SHA with a reviewed 40-character supplychain commit.
name: supplychain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Scan repository
        uses: https://github.com/noeljackson/supplychain@FULL_COMMIT_SHA
        with:
          path: .
          policy: strict
