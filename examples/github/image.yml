# Replace FULL_COMMIT_SHA with a reviewed 40-character supplychain commit.
name: supplychain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supplychain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Gate source before build
        uses: noeljackson/supplychain@FULL_COMMIT_SHA
        with:
          policy: strict
      - name: Build image
        run: docker build --tag app:supplychain-scan .
      - name: Generate SBOM and scan image
        uses: noeljackson/supplychain@FULL_COMMIT_SHA
        with:
          scan-source: false
          image: app:supplychain-scan
          fail-on-severity: high
          only-fixed: false
